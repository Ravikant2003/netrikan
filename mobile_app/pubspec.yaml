name: netrikan
description: Netrikan - Safe Route Navigation Mobile App
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.2
  provider: ^6.0.0
  dio: ^5.3.0
  flutter_map: ^6.0.0
  latlong2: ^0.9.0
  geolocator: ^9.0.0
  permission_handler: ^11.4.0
  intl: ^0.19.0
  shared_preferences: ^2.2.0
  animations: ^2.0.0
  lottie: ^2.4.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/
